project:
  type: website
  output-dir: _site
  # IBD Signal is held back as a draft until the first issue ships: exclude the
  # whole section from the build. To publish, remove the "!ibd-signal/**" line
  # and restore the navbar entry below. Render it while drafting with
  # `quarto preview ibd-signal/`.
  render:
    - "*.qmd"
    - "**/*.qmd"
    - "!ibd-signal/**"

website:
  title: "Mahshad Sarikhani"
  description: "Physician-researcher at Tehran University. Quantitative MRI in IBD, motility MRI, Bayesian multilevel models, and agentic clinical AI pipelines."
  site-url: https://mahshadsa.github.io

  open-graph:
    title: "Mahshad Sarikhani | Radiology & Clinical AI Researcher"
    description: "Physician-researcher at Tehran University. Quantitative MRI in IBD, motility MRI, Bayesian multilevel models, and agentic clinical AI pipelines."
    image: https://mahshadsa.github.io/assets/img/og-image.jpg
    image-width: 1201
    image-height: 630
  twitter-card:
    title: "Mahshad Sarikhani | Radiology & Clinical AI Researcher"
    description: "Physician-researcher at Tehran University. Quantitative MRI in IBD, motility MRI, Bayesian multilevel models, and agentic clinical AI pipelines."
    image: https://mahshadsa.github.io/assets/img/og-image.jpg
    card-style: summary_large_image

  navbar:
    background: light
    foreground: dark
    title: "MS"
    left:
      - text: "About"
        href: about/index.qmd
      - text: "Notes"
        href: notes/index.qmd
      - text: "CV"
        href: cv/index.qmd
      - text: "Work"
        menu:
          - text: "Studies"
            href: work/index.qmd#studies
          - text: "Tools"
            href: work/index.qmd#tools
      # - text: "IBD Signal"        # held back until the first issue ships
      #   href: ibd-signal/index.qmd
      - text: "Log"
        href: log.qmd
    right:
      - icon: github
        href: https://github.com/MahshadSa
      - icon: mortarboard-fill
        href: https://scholar.google.com/citations?user=iKhNW9AAAAAJ
      - icon: envelope-fill
        href: "mailto:mah.sarikhani.md@gmail.com"

  page-footer:
    left: "© 2026 MS · Built with [Quarto](https://quarto.org)"

  search:
    location: navbar
    type: overlay

format:
  html:
    include-in-header:
      - text: |
          <meta name="google-site-verification" content="h-3xdvaDhFjhTCq4gbhij_Dcuitz1axWuYGbUmHf9c0" />
      - _includes/favicon.html
      - _includes/schema.html
    include-after-body:
      - _includes/reveal.html
    theme:
      light: [cosmo, assets/css/custom.scss]
      dark: [cosmo, assets/css/custom-dark.scss]
    css: assets/css/garden.css
    toc: false
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
    smooth-scroll: true
    fontsize: "1.05rem"
    mainfont: "'Source Serif 4', Georgia, serif"
    monofont: "'JetBrains Mono', monospace"
    grid:
      sidebar-width: 0px
      body-width: 720px
      margin-width: 0px

execute:
  freeze: auto
