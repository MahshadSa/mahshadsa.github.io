<!-- Sitewide scroll-in reveals. Self-contained: no SCSS re-render needed.
     Degrades to fully-visible if JS is off or IntersectionObserver is
     unsupported, and is disabled under prefers-reduced-motion. -->
<style>
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition:
      opacity 0.7s cubic-bezier(0.2, 0.7, 0.2, 1),
      transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1);
    will-change: opacity, transform;
  }
  .reveal.is-visible {
    opacity: 1;
    transform: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .reveal,
    .reveal.is-visible {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }
</style>
<script>
  (function () {
    var REVEAL = [
      ".hero-left", ".hero-portrait",
      ".terminal-card",
      ".worklist-label", ".worklist-row",
      ".notes-band .note-item",
      ".project-card", ".proof-card",
      ".timeline-item", ".about-section"
    ].join(",");

    var reduce = window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function run() {
      var nodes = Array.prototype.slice.call(document.querySelectorAll(REVEAL));
      if (!nodes.length) return;

      // No observer support, or reduced motion: show everything, no animation.
      if (reduce || !("IntersectionObserver" in window)) {
        nodes.forEach(function (el) { el.classList.add("is-visible"); });
        return;
      }

      nodes.forEach(function (el) { el.classList.add("reveal"); });

      var io = new IntersectionObserver(function (entries) {
        var i = 0;
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          // Stagger only items that enter together (a scrolled-in group).
          entry.target.style.transitionDelay = Math.min(i++, 6) * 70 + "ms";
          entry.target.classList.add("is-visible");
          io.unobserve(entry.target);
        });
      }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });

      nodes.forEach(function (el) { io.observe(el); });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", run);
    } else {
      run();
    }
  })();
</script>
